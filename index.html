<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Grocer Board (SGB) - Kedai Runcit Masa Hadapan</title>
    <!-- Memanggil Library Pengimbas QR Guna Kamera -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #40916c;
            --accent: #d8f3dc;
            --dark: #1b4332;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f4;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .game-zone {
            background: var(--accent);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px dashed var(--secondary);
        }

        /* Gaya Kotak Kamera Scanner */
        #reader {
            width: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #ccc;
        }

        .situation-box {
            font-weight: bold;
            color: var(--dark);
            font-size: 16px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .price-display {
            font-size: 32px;
            font-weight: bold;
            color: #e63946;
            margin: 10px 0;
        }

        .item-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--secondary);
        }

        .calc-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .wrong {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .bentuk-lazim {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            display: inline-block;
            text-align: right;
            margin: 15px auto;
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            letter-spacing: 2px;
        }
        
        .line {
            border-bottom: 3px solid #333;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .flex-center {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart-Grocer Board (SGB) 🛒</h1>
    <div class="subtitle">Minda Inovatif, Jiwa Adaptif | Sukma Pendidik 2035</div>

    <!-- Zon Imbasan Kamera & Paparan Harga -->
    <div class="game-zone">
        <label style="text-align: left; display: block; font-weight: bold;">Imbas Kod QR Barang Maujud:</label>
        
        <!-- Ruang Kamera Pengimbas -->
        <div id="reader"></div>
        
        <div id="item-nama" class="item-badge" style="display:none;">Nama Barang</div>
        <div id="situation" class="situation-box">Sila benarkan akses kamera dan acukan pada QR Code barang untuk mulakan simulasi.</div>
        <div id="price" class="price-display">RM 0.00</div>
    </div>

    <!-- Zon Pengiraan Juruwang -->
    <div class="calc-section">
        <h3>Sistem Semakan Juruwang Bijak</h3>
        
        <div class="input-group">
            <label for="bayaran">Wang Diterima (RM):</label>
            <input type="number" id="bayaran" step="0.05" placeholder="Contoh: 10.00">
        </div>

        <div class="input-group">
            <label for="bakiMurid">Kira Wang Baki Murid (RM):</label>
            <input type="number" id="bakiMurid" step="0.05" placeholder="Masukkan jawapan anda">
        </div>

        <button class="btn" style="background-color: #2a9d8f;" onclick="semakKiraan()">Semak Jawapan & Bentuk Lazim</button>
        
        <!-- Maklum Balas dan Bentuk Lazim -->
        <div id="feedback" class="result-box">
            <div id="textFeedback" style="margin-bottom: 15px;"></div>
            <div class="flex-center">
                <div id="paparanBentukLazim" class="bentuk-lazim"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Peta Data Barangan berdasarkan Teks/ID dalam kod QR yang anda cipta nanti
    const dataBarang = {
        "biskut": { nama: "Biskut Serat Sihat", hargaAsal: 4.50, situasi: "Promosi Hari Guru: Potongan RM 0.50", beza: -0.50 },
        "pensel": { nama: "Pensel 2B Lestari", hargaAsal: 1.20, situasi: "Cukai Bahan Mentah: Tambah RM 0.10", beza: 0.10 },
        "roti":   { nama: "Roti Gandum Penuh", hargaAsal: 3.20, situasi: "Harga Kawalan Subsidi: Potongan RM 0.20", beza: -0.20 },
        "buku":   { nama: "Buku Tulis Garis Tiga", hargaAsal: 2.00, situasi: "Zon Bebas Cukai: Tiada Perubahan Harga", beza: 0.00 },
        "susu":   { nama: "Susu Kotak Kalsium Tinggi", hargaAsal: 5.80, situasi: "Inflasi Pasaran: Tambah RM 0.40", beza: 0.40 }
    };

    let hargaSemasa = 0;

    // Fungsi yang berjalan apabila kamera berjaya mengimbas teks QR
    function onScanSuccess(decodedText, decodedResult) {
        // Tukar teks QR kepada huruf kecil untuk mengelakkan ralat keserasian
        const token = decodedText.toLowerCase().trim();
        
        if (dataBarang[token]) {
            const barang = dataBarang[token];
            hargaSemasa = barang.hargaAsal + barang.beza;

            // Kemas kini paparan UI
            document.getElementById("item-nama").innerText = barang.nama;
            document.getElementById("item-nama").style.display = "inline-block";
            document.getElementById("situation").innerText = `💡 Situasi: ${barang.situasi}`;
            document.getElementById("price").innerText = `RM ${hargaSemasa.toFixed(2)}`;
            
            // Sembunyikan maklum balas lama untuk sesi baharu
            document.getElementById("feedback").style.display = "none";
        } else {
            document.getElementById("situation").innerText = "⚠️ Kod QR tidak dikenali! Sila imbas QR bagi biskut, pensel, roti, buku, atau susu.";
        }
    }

    function onScanFailure(error) {
        // Kegagalan imbasan kecil (berterusan mencari kod) digagalkan secara senyap supaya tidak mengganggu pengguna
    }

    // Memulakan pengimbas kamera sebaik sahaja aplikasi dibuka
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { fps: 10, qrbox: 250 }, /* peranti imbasan kotak 250x250 piksel */ false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // Fungsi semakan matematik bentuk lazim
    function semakKiraan() {
        const bayaran = parseFloat(document.getElementById("bayaran").value);
        const bakiMurid = parseFloat(document.getElementById("bakiMurid").value);
        const feedback = document.getElementById("feedback");
        const textFeedback = document.getElementById("textFeedback");
        const paparanBentukLazim = document.getElementById("paparanBentukLazim");

        if (isNaN(bayaran) || isNaN(bakiMurid) || hargaSemasa === 0) {
            feedback.className = "result-box wrong";
            textFeedback.innerText = "⚠️ Sila pastikan anda telah mengimbas barang menggunakan kamera dan mengisi semua ruangan!";
            paparanBentukLazim.parentElement.style.display = "none";
            feedback.style.display = "block";
            return;
        }

        const bakiSebenar = bayaran - hargaSemasa;

        if (bayaran < hargaSemasa) {
            feedback.className = "result-box wrong";
            textFeedback.innerText = "❌ Wang diterima tidak mencukupi untuk membeli barang ini!";
            paparanBentukLazim.parentElement.style.display = "none";
            feedback.style.display = "block";
            return;
        }

        // Paparkan Bentuk Lazim
        paparanBentukLazim.parentElement.style.display = "flex";
        paparanBentukLazim.innerHTML = `
            <div>RM ${bayaran.toFixed(2).padStart(6, ' ')}</div>
            <div>- RM ${hargaSemasa.toFixed(2).padStart(6, ' ')}</div>
            <div class="line"></div>
            <div>RM ${bakiSebenar.toFixed(2).padStart(6, ' ')}</div>
            <div class="line" style="border-bottom: 1px solid #333; height:2px; margin-top:2px;"></div>
        `;

        if (Math.abs(bakiMurid - bakiSebenar) < 0.01) {
            feedback.className = "result-box correct";
            textFeedback.innerText = `🎉 TAHNIAH! Kiraan baki tepat. Anda merupakan Juruwang Pendidik 2035 yang bijak!`;
        } else {
            feedback.className = "result-box wrong";
            textFeedback.innerText = `❌ JAWAPAN KURANG TEPAT. Sila semak semula jalan kerja bentuk lazim di bawah:`;
        }

        feedback.style.display = "block";
    }
</script>

</body>
</html>
