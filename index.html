<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Grocer Board (SGB) - Kedai Runcit Masa Hadapan</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #40916c;
            --accent: #d8f3dc;
            --dark: #1b4332;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f4;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .game-zone {
            background: var(--accent);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px dashed var(--secondary);
        }

        #reader {
            width: 100%;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            border: 1px solid #ccc;
        }

        .situation-box {
            font-weight: bold;
            color: var(--dark);
            font-size: 15px;
            margin: 10px 0;
            min-height: 20px;
        }

        /* Gaya Jadual Senarai Barang (Bakul) */
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .cart-table th, .cart-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .cart-table th {
            background-color: var(--secondary);
            color: white;
        }

        .total-display {
            font-size: 24px;
            font-weight: bold;
            color: #e63946;
            margin: 15px 0 5px 0;
            text-align: right;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 5px;
        }

        .btn:hover {
            background: var(--secondary);
        }

        .btn-clear {
            background-color: #6c757d;
            padding: 8px 15px;
            font-size: 14px;
            width: auto;
            margin-top: 5px;
        }

        .calc-section {
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--dark);
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .wrong {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .bentuk-lazim {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            display: inline-block;
            text-align: right;
            margin: 15px auto;
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            letter-spacing: 2px;
        }
        
        .line {
            border-bottom: 3px solid #333;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        
        .flex-center {
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart-Grocer Board (SGB) 🛒</h1>
    <div class="subtitle">Minda Inovatif, Jiwa Adaptif | Sukma Pendidik 2035</div>

    <div class="game-zone">
        <label style="text-align: left; display: block; font-weight: bold;">Acukan Kod QR Barang Pada Kamera:</label>
        
        <div id="reader"></div>
        
        <div id="situation" class="situation-box">Sila imbas kod QR barang untuk dimasukkan ke dalam bakul belanjaan.</div>
        
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Nama Barang</th>
                    <th>Harga (RM)</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <tr>
                    <td colspan="2" style="text-align:center; color:#999;">Bakul kosong. Sila scan barang.</td>
                </tr>
            </tbody>
        </table>
        
        <div id="total-price" class="total-display">Jumlah: RM 0.00</div>
        <button class="btn btn-clear" onclick="kosongkanBakul()">Kosongkan Bakul</button>
    </div>

    <div class="calc-section">
        <h3>Sistem Semakan Juruwang Bijak</h3>
        
        <div class="input-group">
            <label for="bayaran">Wang Diterima (RM):</label>
            <input type="number" id="bayaran" step="0.05" placeholder="Contoh: 10.00 atau 20.00">
        </div>

        <div class="input-group">
            <label for="bakiMurid">Kira Wang Baki Murid (RM):</label>
            <input type="number" id="bakiMurid" step="0.05" placeholder="Masukkan jawapan anda">
        </div>

        <button class="btn" style="background-color: #2a9d8f;" onclick="semakKiraan()">Semak Jawapan & Bentuk Lazim</button>
        
        <div id="feedback" class="result-box">
            <div id="textFeedback" style="margin-bottom: 15px;"></div>
            <div class="flex-center">
                <div id="paparanBentukLazim" class="bentuk-lazim"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Database rujukan barangan
    const dataBarang = {
        "biskut": { nama: "Biskut Serat Sihat", hargaAsal: 4.50, situasi: "Promosi: Potongan RM 0.50", beza: -0.50 },
        "pensel": { nama: "Pensel 2B Lestari", hargaAsal: 1.20, situasi: "Cukai: Tambah RM 0.10", beza: 0.10 },
        "roti":   { nama: "Roti Gandum Penuh", hargaAsal: 3.20, situasi: "Subsidi: Potongan RM 0.20", beza: -0.20 },
        "buku":   { nama: "Buku Tulis Garis Tiga", hargaAsal: 2.00, situasi: "Tiada Perubahan Harga", beza: 0.00 },
        "susu":   { nama: "Susu Kotak Kalsium Tinggi", hargaAsal: 5.80, situasi: "Inflasi: Tambah RM 0.40", beza: 0.40 }
    };

    // Array menampung senarai barang yang berjaya diimbas
    let bakulBelanja = [];
    let jumlahKeseluruhan = 0;
    let lastScannedToken = "";
    let lastScannedTime = 0;

    function onScanSuccess(decodedText, decodedResult) {
        const token = decodedText.toLowerCase().trim();
        const currentTime = Date.now();
        
        // Elakkan imbasan berturut-turut bagi barang yang sama dalam masa 2 saat (anti-spam scanner)
        if (token === lastScannedToken && (currentTime - lastScannedTime < 2000)) {
            return;
        }

        if (dataBarang[token]) {
            lastScannedToken = token;
            lastScannedTime = currentTime;

            const barang = dataBarang[token];
            const hargaFinal = barang.hargaAsal + barang.beza;

            // Masukkan barang ke dalam array bakul
            bakulBelanja.push({
                nama: barang.nama,
                harga: hargaFinal
            });

            document.getElementById("situation").innerHTML = `✅ Berjaya Scan: <b>${barang.nama}</b> (${barang.situasi})`;
            kemasKiniPaparanBakul();
        } else {
            document.getElementById("situation").innerText = "⚠️ Kod QR tidak dikenali. Sila gunakan kod QR biskut, pensel, roti, buku, atau susu.";
        }
    }

    function kemasKiniPaparanBakul() {
        const tbody = document.getElementById("cart-items");
        
        if (bakulBelanja.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#999;">Bakul kosong. Sila scan barang.</td></tr>`;
            jumlahKeseluruhan = 0;
            document.getElementById("total-price").innerText = "Jumlah: RM 0.00";
            return;
        }

        tbody.innerHTML = "";
        jumlahKeseluruhan = 0;

        bakulBelanja.forEach(item => {
            jumlahKeseluruhan += item.harga;
            const row = `<tr>
                <td>${item.nama}</td>
                <td>RM ${item.harga.toFixed(2)}</td>
            </tr>`;
            tbody.innerHTML += row;
        });

        document.getElementById("total-price").innerText = `Jumlah: RM ${jumlahKeseluruhan.toFixed(2)}`;
        // Sembunyikan maklum balas sekiranya ada penambahan barang baharu
        document.getElementById("feedback").style.display = "none";
    }

    function kosongkanBakul() {
        bakulBelanja = [];
        lastScannedToken = "";
        document.getElementById("situation").innerText = "Bakul telah dikosongkan. Sila scan barang baru.";
        kemasKiniPaparanBakul();
    }

    function onScanFailure(error) {
        // Kegagalan imbasan bingkai (frame) diabaikan untuk kelancaran video stream
    }

    // Memulakan kamera QR Scanner dengan parameter optimum
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        }, false);
    
    // Memastikan instans scanner dibersihkan sebelum render untuk mengelakkan ralat perkakasan kamera terkunci
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // Fungsi semakan matematik bentuk lazim (Berdasarkan Jumlah Keseluruhan Bakul)
    function semakKiraan() {
        const bayaran = parseFloat(document.getElementById("bayaran").value);
        const bakiMurid = parseFloat(document.getElementById("bakiMurid").value);
        const feedback = document.getElementById("feedback");
        const textFeedback = document.getElementById("textFeedback");
        const paparanBentukLazim = document.getElementById("paparanBentukLazim");

        if (isNaN(bayaran) || isNaN(bakiMurid) || jumlahKeseluruhan === 0) {
            feedback.className = "result-box wrong";
            textFeedback.innerText = "⚠️ Ralat: Sila pastikan anda telah mengimbas sekurang-kurangnya 1 barang dan mengisi ruangan wang bayaran serta baki!";
            paparanBentukLazim.parentElement.style.display = "none";
            feedback.style.display = "block";
            return;
        }

        const bakiSebenar = bayaran - jumlahKeseluruhan;

        if (bayaran < jumlahKeseluruhan) {
            feedback.className = "result-box wrong";
            textFeedback.innerText = "❌ Wang diterima tidak mencukupi untuk membayar jumlah keseluruhan bakul!";
            paparanBentukLazim.parentElement.style.display = "none";
            feedback.style.display = "block";
            return;
        }

        // Paparkan Jalan Kerja Bentuk Lazim
        paparanBentukLazim.parentElement.style.display = "flex";
        paparanBentukLazim.innerHTML = `
            <div>RM ${bayaran.toFixed(2).padStart(6, ' ')}</div>
            <div>- RM ${jumlahKeseluruhan.toFixed(2).padStart(6, ' ')}</div>
            <div class="line"></div>
            <div>RM ${bakiSebenar.toFixed(2).padStart(6, ' ')}</div>
            <div class="line" style="border-bottom: 1px solid #333; height:2px; margin-top:2px;"></div>
        `;

        if (Math.abs(bakiMurid - bakiSebenar) < 0.01) {
            feedback.className = "result-box correct";
            textFeedback.innerText = `🎉 TAHNIAH! Pengiraan baki anda bagi ${bakulBelanja.length} barang adalah TEPAT. Anda Juruwang Alaf Baharu yang cemerlang!`;
        } else {
            feedback.className = "result-box wrong";
            textFeedback.innerText = `❌ JAWAPAN KURANG TEPAT. Sila semak semula jalan kerja tolak dalam bentuk lazim di bawah:`;
        }

        feedback.style.display = "block";
    }
</script>

</body>
</html>
