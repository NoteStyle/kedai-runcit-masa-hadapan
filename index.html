<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart-Grocer Board (SGB)</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

:root{
    --primary:#2d6a4f;
    --secondary:#40916c;
    --accent:#d8f3dc;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f7f5;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:var(--primary);
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

#reader{
    width:100%;
    max-width:450px;
    margin:auto;
}

.status{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:var(--primary);
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th{
    background:var(--primary);
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
}

.total{
    text-align:right;
    font-size:24px;
    font-weight:bold;
    color:#d62828;
    margin-top:15px;
}

.section{
    margin-top:30px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    margin-right:10px;
}

button:hover{
    background:var(--secondary);
}

.result{
    margin-top:15px;
    padding:15px;
    border-radius:8px;
    display:none;
}

.correct{
    background:#d4edda;
    color:#155724;
}

.wrong{
    background:#f8d7da;
    color:#721c24;
}

@media(max-width:600px){

    th,td{
        font-size:13px;
    }

    .total{
        font-size:20px;
    }

}

</style>
</head>
<body>

<div class="container">

<h1>🛒 Smart-Grocer Board</h1>

<div class="subtitle">
Minda Inovatif, Jiwa Adaptif
</div>

<div id="reader"></div>

<div id="status" class="status">
Sila imbas QR Code barang
</div>

<table>

<thead>
<tr>
<th>Barang</th>
<th>Harga (RM)</th>
</tr>
</thead>

<tbody id="cart">
<tr>
<td colspan="2" align="center">
Bakul kosong
</td>
</tr>
</tbody>

</table>

<div id="total" class="total">
Jumlah: RM 0.00
</div>

<br>

<button onclick="clearCart()">
Kosongkan Bakul
</button>

<button onclick="stopScanner()">
Henti Scanner
</button>

<div class="section">

<h2>Sistem Juruwang</h2>

<label>Wang Diterima (RM)</label>
<input type="number" id="bayaran" step="0.01">

<label>Baki Yang Dikira Murid (RM)</label>
<input type="number" id="jawapan" step="0.01">

<button onclick="checkAnswer()">
Semak Jawapan
</button>

<div id="feedback" class="result"></div>

</div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>

const barang = {

    "biskut":{
        nama:"Biskut Serat Sihat",
        harga:4.00
    },

    "pensel":{
        nama:"Pensel 2B",
        harga:1.30
    },

    "roti":{
        nama:"Roti Gandum",
        harga:3.00
    },

    "buku":{
        nama:"Buku Tulis",
        harga:2.00
    },

    "susu":{
        nama:"Susu Kotak",
        harga:6.20
    }

};

let bakul=[];
let jumlah=0;

let scanner;

let lastCode="";
let lastTime=0;

function scanSuccess(decodedText){

    const now=Date.now();

    if(
        decodedText===lastCode &&
        now-lastTime<3000
    ){
        return;
    }

    lastCode=decodedText;
    lastTime=now;

    const token=decodedText.toLowerCase();

    for(let key in barang){

        if(token.includes(key)){

            document.getElementById("beep").play();

            bakul.push(barang[key]);

            document.getElementById("status").innerHTML=
            "✅ "+barang[key].nama+" berjaya diimbas";

            updateCart();

            return;
        }
    }

    document.getElementById("status").innerHTML=
    "❌ QR tidak dikenali";
}

function scanFail(error){}

function updateCart(){

    const tbody=document.getElementById("cart");

    if(bakul.length===0){

        tbody.innerHTML=
        `<tr>
        <td colspan="2" align="center">
        Bakul kosong
        </td>
        </tr>`;

        jumlah=0;

        document.getElementById("total").innerHTML=
        "Jumlah: RM 0.00";

        return;
    }

    tbody.innerHTML="";

    jumlah=0;

    bakul.forEach(item=>{

        jumlah+=item.harga;

        tbody.innerHTML+=`
        <tr>
        <td>${item.nama}</td>
        <td>RM ${item.harga.toFixed(2)}</td>
        </tr>
        `;

    });

    document.getElementById("total").innerHTML=
    `Jumlah: RM ${jumlah.toFixed(2)}`;
}

function clearCart(){

    bakul=[];

    updateCart();

    document.getElementById("status").innerHTML=
    "Bakul dikosongkan";
}

function checkAnswer(){

    const bayaran=
    parseFloat(document.getElementById("bayaran").value);

    const jawapan=
    parseFloat(document.getElementById("jawapan").value);

    const feedback=
    document.getElementById("feedback");

    if(isNaN(bayaran)||isNaN(jawapan)){

        feedback.style.display="block";
        feedback.className="result wrong";
        feedback.innerHTML=
        "Sila isi semua ruangan.";

        return;
    }

    if(bayaran<jumlah){

        feedback.style.display="block";
        feedback.className="result wrong";
        feedback.innerHTML=
        "Wang tidak mencukupi.";

        return;
    }

    const baki=bayaran-jumlah;

    if(Math.abs(jawapan-baki)<0.01){

        feedback.style.display="block";
        feedback.className="result correct";
        feedback.innerHTML=
        `Tahniah! Jawapan betul.<br>
        Baki sebenar = RM ${baki.toFixed(2)}`;

    }else{

        feedback.style.display="block";
        feedback.className="result wrong";
        feedback.innerHTML=
        `Jawapan kurang tepat.<br>
        Baki sebenar = RM ${baki.toFixed(2)}`;
    }
}

async function startScanner(){

    try{

        scanner=new Html5Qrcode("reader");

        await scanner.start(

            {
                facingMode:"environment"
            },

            {
                fps:20,
                qrbox:{
                    width:250,
                    height:250
                }
            },

            scanSuccess,
            scanFail

        );

    }
    catch(error){

        document.getElementById("status").innerHTML=
        "Gagal mengakses kamera";
    }
}

async function stopScanner(){

    if(scanner){

        await scanner.stop();
        await scanner.clear();

        document.getElementById("status").innerHTML=
        "Scanner dihentikan";
    }
}

startScanner();

</script>

</body>
</html>
